services:
  admin-backend:
    build: .
    container_name: ohchainn-admin-backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000

  reverse-proxy:
    image: nginx:stable-alpine
    container_name: ohchainn-admin-proxy
    depends_on:
      - admin-backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    restart: unless-stopped
